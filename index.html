
<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Visio-LIN LT v7</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; margin: 10px; }
.container { max-width: 1200px; margin:auto; }

.grid {
  display:grid;
  grid-template-columns: 2fr 1fr;
  gap:15px;
}

@media(max-width:900px){
  .grid { grid-template-columns:1fr; }
}

.card { border:1px solid #ccc; padding:10px; border-radius:8px; }

input,select,button{
  width:100%;
  margin:5px 0;
  padding:8px;
}
</style>
</head>

<body>

<div class="container">

<h2>Visio-LIN LT v7</h2>

<div class="card">
<select id="location">
  <option value="vilniaus-ams">Vilnius</option>
  <option value="dotnuvos-ams">Kėdainiai</option>
</select>

<input type="date" id="germination">
<button onclick="init()">Atnaujinti</button>
</div>

<div class="grid">

<div class="card">
<canvas id="chart"></canvas>
</div>

<div class="card">
<h3>Statusas</h3>
<div id="stage"></div>

<h3>Rekomendacijos</h3>
<div id="rec"></div>

<h3>Artimiausios 10 d.</h3>
<div id="plan"></div>
</div>

</div>
</div>

<script>
const BASE=5;

// ===== API FETCH =====
async function fetchYear(station, year){
  const res = await fetch(`https://api.meteo.lt/v1/stations/${station}/observations/${year}-01-01`);
  const json = await res.json();
  return json.observations;
}

// ===== GDD =====
function calcGDD(data, germ){
  let sum=0;
  let arr=[];

  data.forEach(d=>{
    let date=d.observationTimeUtc.split(" ")[0];
    let t=parseFloat(d.airTemperature);
    if(!t) return;

    let gdd=Math.max(t-BASE,0);
    if(date>=germ) sum+=gdd;

    arr.push({date,sum});
  });

  return arr;
}

// ===== PROGNOZĖ (paprasta) =====
function forecast(lastValue){
  let arr=[];
  let sum=lastValue;

  for(let i=1;i<=10;i++){
    sum+=10; // vidutinis augimas
    arr.push(sum);
  }
  return arr;
}

// ===== ISTORIJA (supaprastinta bazė) =====
function fakeAvg(data){
  return data.map(d=>d.sum*0.9);
}

// ===== STAGES =====
function stage(sum){
  if(sum<150) return "Dygimas";
  if(sum<300) return "Ankstyvas augimas";
  if(sum<500) return "Intensyvus augimas";
  if(sum<600) return "Prieš žydėjimą";
  if(sum<850) return "Po žydėjimo";
  return "Branda";
}

// ===== REKOMENDACIJOS =====
function rec(sum){
  if(sum<300) return "PURKŠTI nuo piktžolių (iki 20 cm)";
  if(sum<600) return "REGULIATORIUS + fungicidas (azoksistrobinas)";
  if(sum<850) return "STEbėti, ruoštis rovimo langui";
  return "ROVIMAS";
}

// ===== 10 dienų planas =====
function plan(sum){
  let out="";
  for(let i=1;i<=10;i++){
    let s=sum+i*10;

    if(s<300) out+="D"+i+": herbicidas<br>";
    else if(s<600) out+="D"+i+": reguliatorius<br>";
    else out+="D"+i+": stebėti<br>";
  }
  return out;
}

// ===== CHART =====
let chart=new Chart(document.getElementById("chart"),{
  type:"line",
  data:{
    labels:[],
    datasets:[
      {label:"Šie metai", data:[], borderWidth:4, borderColor:"green"},
      {label:"Prognozė", data:[], borderDash:[6,6], borderColor:"green"},
      {label:"Vidurkis", data:[], borderColor:"gray"}
    ]
  }
});

// ===== MAIN =====
async function init(){

  const station=document.getElementById("location").value;
  const germ=document.getElementById("germination").value;

  if(!germ){ alert("Įvesk sudygimo datą"); return; }

  const year=new Date().getFullYear();

  const raw=await fetchYear(station,year);
  const gdd=calcGDD(raw,germ);

  const last=gdd[gdd.length-1].sum;

  // labels
  chart.data.labels=gdd.map(d=>d.date);

  // faktas
  chart.data.datasets[0].data=gdd.map(d=>d.sum);

  // prognozė
  let f=forecast(last);
  chart.data.datasets[1].data=[
    ...Array(gdd.length-1).fill(null),
    last,
    ...f
  ];

  // vidurkis (placeholder)
  chart.data.datasets[2].data=fakeAvg(gdd);

  chart.update();

  // UI
  document.getElementById("stage").innerHTML=stage(last);
  document.getElementById("rec").innerHTML=rec(last);
  document.getElementById("plan").innerHTML=plan(last);
}
</script>

</body>
</html>
