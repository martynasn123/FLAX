<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visio-LIN LT v6</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; margin: 10px; }
.container { max-width: 1100px; margin: auto; }

.grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 15px;
}

@media(min-width:900px){
  .grid { grid-template-columns: 2fr 1fr; }
}

.card {
  border: 1px solid #ccc;
  padding: 10px;
  border-radius: 8px;
}

input, select, button {
  width: 100%;
  margin: 5px 0;
  padding: 8px;
}
</style>
</head>

<body>

<div class="container">

<h2>Visio-LIN LT</h2>

<div class="card">
<label>Veislė</label>
<select id="variety">
  <option value="early">DELTA (ankstyva)</option>
  <option value="mid">DAMARA</option>
  <option value="mid">WPB ELOISE</option>
</select>

<label>Vietovė</label>
<select id="location">
  <option value="vilnius">Vilnius</option>
  <option value="kedainiai">Kėdainiai</option>
</select>

<label>Sudygimo data</label>
<input type="date" id="germination">

<label>Tarpueilis (cm)</label>
<select id="row">
  <option value="7">7</option>
  <option value="12.5">12.5</option>
  <option value="15">15</option>
  <option value="18">18</option>
</select>

<label>Augalai per 20 cm</label>
<input type="number" id="plants">

<button onclick="loadData()">Atnaujinti</button>
</div>

<div class="grid">

<div class="card">
<canvas id="chart"></canvas>
</div>

<div class="card">
<h3>Rekomendacijos</h3>
<div id="rec"></div>

<h3>Tankumas</h3>
<div id="density"></div>
</div>

</div>

</div>

<script>
const BASE = 5;

const STATIONS = {
  vilnius: "vilniaus-ams",
  kedainiai: "dotnuvos-ams"
};

let chart = new Chart(document.getElementById("chart"), {
  type: "line",
  data: {
    labels: [],
    datasets: [{
      label: "°C·d",
      data: [],
      borderWidth: 4,
      borderColor: "green"
    }]
  }
});

async function fetchData(station){
  const year = new Date().getFullYear();
  const res = await fetch(`https://api.meteo.lt/v1/stations/${station}/observations/${year}-01-01`);
  const json = await res.json();
  return json.observations;
}

function calcGDD(data, germ){
  let sum = 0;
  let arr = [];

  data.forEach(d=>{
    let date = d.observationTimeUtc.split(" ")[0];
    let t = parseFloat(d.airTemperature);
    if(!t) return;

    let gdd = Math.max(t-BASE,0);

    if(date>=germ) sum+=gdd;

    arr.push({date,sum});
  });

  return arr;
}

function getStage(sum){
  if(sum<150) return "Dygimas";
  if(sum<300) return "Ankstyvas augimas";
  if(sum<500) return "Intensyvus augimas";
  if(sum<600) return "Prieš žydėjimą";
  if(sum<850) return "Po žydėjimo";
  return "Branda";
}

function recommendations(sum){
  if(sum<300){
    return "Piktžolių kontrolė (iki ~20 cm). Galimos veikliosios: quizalofop, bentazonas.";
  }
  if(sum<600){
    return "Stebėti ligas (miltligė). Galimi: azoksistrobinas, tebukonazolas. Vertinti išgulimo riziką.";
  }
  if(sum<850){
    return "Nebenaudoti fungicidų. Planuoti rovimą.";
  }
  return "Rovimo langas. Vengti perbrendimo.";
}

function calcDensity(){
  let row = parseFloat(document.getElementById("row").value);
  let plants = parseFloat(document.getElementById("plants").value);

  if(!plants) return;

  let density = plants * (100/20) * (100/row);

  let status = "🟡";
  if(density>1400 && density<1700) status="🟢";
  if(density<1200 || density>2000) status="🔴";

  document.getElementById("density").innerHTML =
    density.toFixed(0)+" aug/m² "+status;
}

async function loadData(){
  let station = STATIONS[document.getElementById("location").value];
  let germ = document.getElementById("germination").value;

  if(!germ){ alert("Įvesk sudygimo datą"); return; }

  let raw = await fetchData(station);
  let gdd = calcGDD(raw, germ);

  chart.data.labels = gdd.map(d=>d.date);
  chart.data.datasets[0].data = gdd.map(d=>d.sum);
  chart.update();

  let last = gdd[gdd.length-1].sum;

  document.getElementById("rec").innerHTML =
    "<b>"+getStage(last)+"</b><br>"+recommendations(last);

  calcDensity();
}
</script>

</body>
</html>
